<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    </head>
    <body class="min-h-screen bg-white flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl p-8 card-shadow">
            <div class="text-center mb-8 logo-container">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-24 h-24 mx-auto mb-4">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Git<span class="text-purple-600">Hub</span> Issues</h1>
                <p class="text-gray-600">Track and manage your project issues</p>
            </div>
<form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent input-focus"
                        placeholder="Enter your username"
                        required
                    >
                    <p class="text-xs text-purple-600 mt-1">Default: <span class="font-semibold">admin</span></p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent input-focus"
                        placeholder="Enter your password"
                        required
                    >
                    <p class="text-xs text-purple-600 mt-1">Default: <span class="font-semibold">admin123</span></p>
                </div>
                
                <button 
                    type="submit" 
                    class="w-full py-3 px-4 btn-primary text-white font-semibold rounded-lg flex items-center justify-center space-x-2 hover:opacity-90"
                >
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
      <div class="mt-6 text-center">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">OR</span>
                    </div>
                </div>
                
                <div class="mt-4 bg-gray-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600 mb-2">Demo Credentials:</p>
                    <p class="text-sm font-semibold text-gray-800">Username: admin</p>
                    <p class="text-sm font-semibold text-gray-800">Password: admin123</p>
                </div>
            </div>
            
            <div id="errorMessage" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg hidden">
                <p class="text-sm text-red-600 flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText"></span>
                </p>
            </div>
        </div>
    </div>        
     <script src="js/login.js"></script>
</body>
</html>
