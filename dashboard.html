<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .bg-gradient-purple {
            background: #4A00FF;
        }
        
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .input-focus {
            transition: all 0.2s;
        }
        
        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .btn-primary {
            background: #4A00FF;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(74, 0, 255, 0.4), 0 10px 10px -5px rgba(74, 0, 255, 0.2);
        }
        
        .tab-active {
            background: #4A00FF;
            color: white;
            border: none;
        }
        
        .tab-inactive {
            background: white;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }
        
        .tab-inactive:hover {
            background: #f3f4f6;
            color: #374151;
        }
        
        .card-open {
            border-top: 4px solid #10b981;
        }
        
        .card-closed {
            border-top: 4px solid #8b5cf6;
        }
        
        .badge-open {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-closed {
            background: #ede9fe;
            color: #5b21b6;
        }
        
        .badge-label {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-priority {
            background: #fce7f3;
            color: #9f1239;
        }
        
        .animate-pulse-slow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .modal-backdrop {
            backdrop-filter: blur(4px);
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
    </head>
    <body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center space-x-2">
                        <img src="assets/github-logo.png" alt="GitHub Logo" class="w-8 h-8">
                        <h1 class="text-xl font-bold text-gray-800">Git<span class="text-purple-600">Hub</span> Issues</h1>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="relative hidden md:block">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search issues..." 
                            class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent input-focus w-64"
                        >
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                    </div>
                    
                    <button 
                        id="logoutBtn" 
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"
                    >
                        <i class="fas fa-sign-out-alt mr-2"></i>
                        Logout
                    </button>
                </div>
            </div>
            
            <!-- Mobile Search -->
            <div class="md:hidden px-4 pb-4">
                <input 
                    type="text" 
                    id="mobileSearchInput" 
                    placeholder="Search issues..." 
                    class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent input-focus"
                >
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tab Navigation -->
        <div class="bg-white rounded-xl p-4 card-shadow mb-6">
            <div class="flex space-x-4 overflow-x-auto pb-2">
                <button 
                    id="tabAll" 
                    class="tab-active px-6 py-2 rounded-lg font-medium whitespace-nowrap"
                    onclick="switchTab('all')"
                >
                    All
                </button>
                <button 
                    id="tabOpen" 
                    class="tab-inactive px-6 py-2 rounded-lg font-medium whitespace-nowrap"
                    onclick="switchTab('open')"
                >
                    Open
                </button>
                <button 
                    id="tabClosed" 
                    class="tab-inactive px-6 py-2 rounded-lg font-medium whitespace-nowrap"
                    onclick="switchTab('closed')"
                >
                    Closed
                </button>
            </div>
        </div>
        
        <!-- Statistics -->
        <div class="bg-white rounded-lg p-6 card-shadow mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                <div class="flex items-center space-x-4 mb-4 md:mb-0">
                    <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="Aperture" class="w-10 h-10">
                    </div>
                    <div>
                        <div class="text-2xl font-bold text-gray-800">
                            <span id="issueCount">0</span> Issues
                        </div>
                        <div class="text-gray-500 mt-1">Track and manage your project issues</div>
                    </div>
                </div>
                
                <div class="flex space-x-6">
                    <div class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                        <span class="text-sm text-gray-600" id="openCount">0 Open</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                        <span class="text-sm text-gray-600" id="closedCount">0 Closed</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Issues Grid -->
        <div id="issuesContainer" class="grid grid-cols-4 gap-4">
            <!-- Loading Spinner -->
            <div class="col-span-full flex flex-col items-center justify-center py-20">
                <div class="w-16 h-16 border-4 border-gray-200 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                <p class="text-gray-600">Loading issues...</p>
            </div>
        </div>
        
        <!-- No Issues Message -->
        <div id="noIssuesMessage" class="col-span-full hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-inbox text-gray-400 text-3xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-800 mb-2">No issues found</h3>
            <p class="text-gray-600">Try adjusting your search or filter settings</p>
        </div>
    </main>
    
    <!-- Issue Modal -->
    <div id="issueModal" class="fixed inset-0 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen px-4 sm:px-6 lg:px-8">
            <div class="absolute inset-0 modal-backdrop"></div>
                <div class="bg-white rounded-xl card-shadow max-w-2xl w-full max-h-[90vh] overflow-y-auto relative">
                <div class="absolute top-0 right-0 p-4">
                    <button id="closeModal" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                        <i class="fas fa-times text-gray-600"></i>
                    </button>
                </div>
                
                <div class="p-6 md:p-8">
                    <div id="modalContent">
                        <!-- Modal content will be dynamically loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/dashboard.js"></script>
</body>
</html>
